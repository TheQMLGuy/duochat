name: Android APK build & release

on:
  push:
    branches:
      - main
      - "claude/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platform-tools platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125"

      - name: Export NDK env
        run: |
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize Android project
        run: pnpm tauri android init

      - name: Build debug APK
        run: pnpm tauri android build --apk --debug

      - name: Locate APK
        id: locate
        run: |
          APK=$(find src-tauri/gen/android -name "*-debug.apk" -type f | head -n1)
          if [ -z "$APK" ]; then
            echo "No APK produced" >&2
            find src-tauri/gen/android -name "*.apk" || true
            exit 1
          fi
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "apk_name=duochat-${GITHUB_SHA::7}-debug.apk" >> $GITHUB_OUTPUT

      - name: Stage renamed APK
        run: |
          mkdir -p out
          cp "${{ steps.locate.outputs.apk_path }}" "out/${{ steps.locate.outputs.apk_name }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: duochat-debug-apk
          path: out/${{ steps.locate.outputs.apk_name }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: android-${{ github.ref_name }}-${{ github.sha }}
          name: Android debug build ${{ github.ref_name }} (${{ github.sha }})
          body: |
            Automated debug APK for branch `${{ github.ref_name }}` at commit ${{ github.sha }}.

            **Note:** this is an unsigned debug build. To install, enable "Install unknown apps" for your browser/file manager, then open the APK on your Android device.
          files: out/${{ steps.locate.outputs.apk_name }}
          prerelease: true
          fail_on_unmatched_files: true
